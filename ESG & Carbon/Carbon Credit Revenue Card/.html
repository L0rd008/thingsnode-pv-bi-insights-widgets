<div class="carbon-rev-card">
    <div class="card-header">
        <span class="card-icon js-icon"></span>
        <span class="card-title js-title"></span>
    </div>

    <div class="card-body">
        <div class="value-row">
            <span class="main-value skeleton js-value">--</span>
            <span class="currency-unit js-unit"></span>
        </div>
        <div class="main-label js-main-label">ANNUAL VALUE</div>

        <div class="sub-content">
            <div class="delta-container js-delta">
                <span class="delta-arrow js-delta-arrow">▲</span>
                <span class="delta-value js-delta-value">--%</span>
                <span class="delta-label js-delta-label"></span>
            </div>
            <div class="status-container js-status">
                <span class="status-dot js-status-dot"></span>
                <span class="status-text js-status-text"></span>
            </div>
        </div>
    </div>

    <div class="bar-section">
        <div class="bar-header">
            <span class="bar-title js-bar-title">LIFETIME POTENTIAL VALUE</span>
            <span class="bar-value-text js-bar-value">--</span>
        </div>
        <div class="progress-track">
            <div class="progress-fill js-progress-fill"></div>
        </div>
    </div>

    <div class="card-footer">
        <div class="footer-left js-footer-left">Estimated</div>
        <div class="footer-right js-footer-right">* Based on verified standards</div>
    </div>

    <div class="tooltip-container">
        <div class="tooltip-text js-tooltip"></div>
    </div>
</div>
