<div class="pv-curtailment-widget">
    <div class="curt-card">

        <!-- ── Header ── -->
        <div class="card-header">
            <div id="settings-btn" class="settings-btn" title="Widget Settings">⚙️</div>
            <div class="card-title js-title">CURTAILMENT VS POTENTIAL POWER</div>
            <div class="header-status">
                <span class="status-dot js-status-dot nodata"></span>
                <span class="status-text js-status-text">WAITING</span>
            </div>
        </div>

        <!-- ── Chart ── -->
        <div class="chart-body">
            <div class="y-axis-title js-y-title">POWER (kW)</div>
            <div class="chart-container">
                <canvas class="js-canvas"></canvas>
            </div>
        </div>

        <!-- ── Summary bar (replaces old tooltip) ── -->
        <div class="summary-bar js-summary-bar">
            <span class="sb-item sb-label">Initialising…</span>
        </div>

        <!-- ── Footer legend ── -->
        <div class="card-footer">
            <div class="legend-item">
                <div class="legend-line dashed"></div>
                <div class="legend-label js-legend-potential">Potential Power</div>
            </div>
            <div class="legend-item">
                <div class="legend-line solid"></div>
                <div class="legend-label js-legend-exported">Exported Power</div>
            </div>
            <div class="legend-item">
                <div class="legend-block curtailed"></div>
                <div class="legend-label js-legend-curtailed">Curtailment Loss</div>
            </div>
        </div>

    </div><!-- /.curt-card -->

    <!-- ══════════════════════════════════════════════
         SETTINGS MODAL
         Multi-column layout for efficient use of space
         ══════════════════════════════════════════════ -->
    <div id="settings-modal" class="settings-modal-overlay" style="display:none;">
        <div class="settings-modal-content">

            <div class="modal-header">
                <span class="modal-title">⚙ Widget Settings</span>
                <span class="modal-subtitle">Changes apply after Save &amp; Reload</span>
            </div>

            <!-- Section: Timeframe -->
            <div class="modal-section-label">Timeframe</div>
            <div class="modal-grid modal-grid-1">
                <div class="setting-group">
                    <label>Period</label>
                    <select id="set-timeframe">
                        <option value="today">Today (full day)</option>
                        <option value="yesterday">Yesterday</option>
                        <option value="day_before">Day Before Yesterday</option>
                        <option value="this_week">This Week</option>
                        <option value="prev_week">Previous Week</option>
                        <option value="this_month">This Month</option>
                    </select>
                </div>
            </div>

            <!-- Section: Data Keys -->
            <div class="modal-section-label">Data Keys</div>
            <div class="modal-grid modal-grid-2">
                <div class="setting-group">
                    <label>Actual Power Keys <span class="label-hint">(comma-separated)</span></label>
                    <input type="text" id="set-actual-keys" value="active_power" placeholder="e.g. active_power">
                </div>
                <div class="setting-group">
                    <label>Setpoint Keys <span class="label-hint">(comma-separated)</span></label>
                    <input type="text" id="set-setpoint-keys" value="setpoint_active_power, curtailment_limit" placeholder="e.g. setpoint_active_power">
                </div>
            </div>

            <!-- Section: Capacity -->
            <div class="modal-section-label">Plant Capacity</div>
            <div class="modal-grid modal-grid-3">
                <div class="setting-group setting-group-wide">
                    <label>Capacity Attribute Key</label>
                    <input type="text" id="set-capacity-key" value="Plant Total Capacity" placeholder="Server-scope attribute name">
                </div>
                <div class="setting-group">
                    <label>Capacity Unit</label>
                    <select id="set-cap-unit">
                        <option value="MW">MW</option>
                        <option value="kW">kW</option>
                    </select>
                </div>
                <div class="setting-group">
                    <label>Fallback (kW)</label>
                    <input type="number" id="set-fallback-power" value="1000" step="100" min="1" title="Used when the capacity attribute is unavailable">
                </div>
            </div>

            <!-- Section: Display -->
            <div class="modal-section-label">Display</div>
            <div class="modal-grid modal-grid-3">
                <div class="setting-group">
                    <label>Display Unit</label>
                    <input type="text" id="set-disp-unit" value="kW" placeholder="kW or MW">
                </div>
                <div class="setting-group">
                    <label>Decimal Places</label>
                    <input type="number" id="set-decimals" value="1" min="0" max="4" step="1">
                </div>
                <div class="setting-group">
                    <label>Error Margin (%)</label>
                    <input type="number" id="set-err-margin" value="10" min="0" max="100" step="1" title="Uncertainty applied to the curtailment loss estimate">
                </div>
            </div>

            <!-- Actions -->
            <div class="settings-modal-actions">
                <button id="btn-cancel" class="btn-cancel">✕ Cancel</button>
                <button id="btn-save"   class="btn-save">✔ Save &amp; Reload</button>
            </div>

        </div><!-- /.settings-modal-content -->
    </div><!-- /#settings-modal -->

</div><!-- /.pv-curtailment-widget -->
