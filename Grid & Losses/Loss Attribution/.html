<div class="loss-card">

    <div class="card-header">
        <div class="card-title js-title">--</div>
        <div class="header-right">
            <span class="status-dot js-status-dot"></span>
            <span class="status-text js-status-text">--</span>
            <div class="card-icon js-icon"></div>
        </div>
    </div>

    <div class="card-body metric-body js-metric-body">
        <span class="main-value skeleton js-value">--</span>
        <span class="sub-text js-sub">--</span>
    </div>

    <div class="selector-body js-selector-body">
        <select class="range-mode-select js-range-mode-select">
            <option value="day">Day</option>
            <option value="month">Month</option>
            <option value="year">Year</option>
            <option value="lifetime">Lifetime</option>
            <option value="custom">Custom</option>
        </select>
        <div class="range-input-row">
            <input class="range-input js-day-input" type="date" />
            <input class="range-input js-month-input" type="month" />
            <input class="range-input js-year-input" type="number" min="1990" max="2100" step="1" />
            <input class="range-input custom-date js-custom-start" type="date" />
            <input class="range-input custom-date js-custom-end" type="date" />
        </div>
    </div>

    <div class="card-footer">
        <span class="footer-label js-footer-label">--</span>
        <span class="delta-container js-delta">
            <span class="delta-arrow js-delta-arrow"></span>
            <span class="delta-value js-delta-value">--%</span>
            <span class="delta-label js-delta-label"></span>
        </span>
    </div>

    <div class="tooltip-container">
        <div class="tooltip-content js-tooltip"></div>
    </div>

</div>
