<div class="claims-card">
    <!-- ═══ HEADER ═══ -->
    <div class="card-header">
        <div class="card-title js-title">WEEKLY CURTAILMENT EVENTS</div>
        <div class="header-right">
            <span class="status-dot js-status-dot"></span>
            <span class="status-text js-status-text">--</span>
        </div>
    </div>

    <!-- ═══ SUMMARY STATS ═══ -->
    <div class="summary-row">
        <div class="stat-item">
            <span class="stat-label">Total Events</span>
            <span class="stat-value js-stat-count">--</span>
        </div>
        <div class="stat-sep"></div>
        <div class="stat-item">
            <span class="stat-label">Avg Restriction</span>
            <span class="stat-value stat-warn js-stat-avg">--</span>
        </div>
    </div>

    <!-- ═══ TABLE HEADER ═══ -->
    <div class="table-header">
        <div class="col col-date">Date & Time</div>
        <div class="col col-event">Event Target</div>
        <div class="col col-amount">Restriction %</div>
        <div class="col col-status">Status</div>
    </div>

    <!-- ═══ TABLE BODY ═══ -->
    <div class="table-body js-list"></div>

    <!-- ═══ FOOTER ═══ -->
    <div class="card-footer">
        <span class="footer-label">Selected Asset:</span>
        <span class="footer-value js-asset">--</span>
    </div>

    <!-- ═══ TOOLTIP — Glassmorphism ═══ -->
    <div class="tooltip-container">
        <div class="tooltip-content js-tooltip">Demo Weekly Curtailment Widget</div>
    </div>
</div>
