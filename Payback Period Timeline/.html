<div class="payback-card">
    <div class="card-header">
        <div class="card-title js-title">PAYBACK PERIOD</div>
    </div>

    <div class="timeline-area">

        <!-- LABEL ZONE: ABOVE TRACK (Simple Payback) -->
        <div class="label-zone label-zone-top">
            <div class="marker-label-container js-label-simple">
                <div class="marker-value-text skeleton js-val-simple">-- Years</div>
                <div class="marker-sub-text js-sub-simple">Simple Payback</div>
            </div>
        </div>

        <!-- TRACK -->
        <div class="track-container">
            <div class="track-bg"></div>
            <div class="track-fill js-track-fill"></div>

            <div class="dot simple-dot js-dot-simple">
                <div class="dot-glow"></div>
                <div class="dot-core"></div>
            </div>

            <div class="dot discounted-dot js-dot-discounted">
                <div class="dot-core"></div>
            </div>
        </div>

        <!-- LABEL ZONE: BELOW TRACK (Discounted) -->
        <div class="label-zone label-zone-bottom">
            <div class="marker-label-container js-label-discounted">
                <div class="marker-value-text text-grey skeleton js-val-discounted">-- Years</div>
                <div class="marker-sub-text js-sub-discounted">Discounted</div>
            </div>
        </div>

        <!-- AXIS -->
        <div class="axis-numbers js-axis"></div>
    </div>

    <div class="tooltip-container">
        <div class="tooltip-content js-tooltip"></div>
    </div>
</div>
